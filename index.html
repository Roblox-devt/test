<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Maze Horror - Backrooms Wallpaper</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #f00; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; cursor: pointer; text-align: center;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; width: 200px; height: 10px;
            border: 2px solid #333; background: #111; z-index: 10;
        }
        #stamina-bar { height: 100%; background: #0f0; width: 100%; transition: width 0.1s linear; }
        #blur-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; backdrop-filter: blur(0px); z-index: 5;
            transition: backdrop-filter 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>MAZE HORROR</h1>
        <p>CLICK ANYWHERE TO START</p>
        <span style="color: #666; font-size: 0.8em;">WASD: Move | SHIFT: Sprint | Mouse: Look</span>
    </div>
    <div id="ui"><div id="stamina-bar"></div></div>
    <div id="blur-overlay"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock, gameRunning = false;
        let moveFwd = false, moveBwd = false, moveL = false, moveR = false, sprinting = false;
        let stamina = 20, maxStamina = 20, exhausted = false;
        let walls = [], redMonster, purpleMonster, audioCtx;
        
        let purpleTarget = new THREE.Vector3();
        let purpleWanderTimer = 0;
        const wallSize = 2;

        window.onload = init;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x444444); 
            scene.fog = new THREE.FogExp2(0x444444, 0.02); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            scene.add(new THREE.AmbientLight(0xffffff, 0.8)); 
            
            const flashlight = new THREE.PointLight(0xffffff, 2.0, 30); 
            camera.add(flashlight);
            scene.add(camera);

            createMaze();
            createMonsters();

            document.addEventListener('keydown', (e) => handleInput(e.code, true));
            document.addEventListener('keyup', (e) => handleInput(e.code, false));
            document.getElementById('overlay').addEventListener('click', start);
            window.addEventListener('resize', onResize);

            animate();
        }

        function createMaze() {
            const loader = new THREE.TextureLoader();

            // 1. FLOOR TEXTURE (Using previous carpet settings)
            const floorTex = loader.load('carp.png'); 
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(100, 100);
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200), 
                new THREE.MeshStandardMaterial({ map: floorTex })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 2. WALL TEXTURE (Your provided arrow wallpaper)
            const wallTex = loader.load('yellowwall.png'); 
            wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
            // Walls are 4 units high and 2 units wide. Repeat 1x horizontally, 2x vertically.
            wallTex.repeat.set(1, 2); 

            const wallGeo = new THREE.BoxGeometry(wallSize, 4, wallSize);
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTex }); 

            for(let x = -20; x < 20; x++) {
                for(let z = -20; z < 20; z++) {
                    if (Math.abs(x) < 2 && Math.abs(z) < 2) continue; 
                    if (Math.random() > 0.8 || x === -20 || x === 19 || z === -20 || z === 19) {
                        const wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(x * wallSize, 2, z * wallSize);
                        scene.add(wall);
                        walls.push(wall);
                    }
                }
            }
        }

        function createMonsters() {
            redMonster = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2, 0.8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            redMonster.position.set(15, 1, 15);
            scene.add(redMonster);

            purpleMonster = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshBasicMaterial({ color: 0x8800ff }));
            purpleMonster.position.set(-10, 0.6, -10);
            scene.add(purpleMonster);
        }

        function start() {
            document.getElementById('overlay').style.display = 'none';
            renderer.domElement.requestPointerLock();
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            gameRunning = true;
        }

        function handleInput(code, val) {
            if (code === 'KeyW') moveFwd = val;
            if (code === 'KeyS') moveBwd = val;
            if (code === 'KeyA') moveL = val;
            if (code === 'KeyD') moveR = val;
            if (code === 'ShiftLeft') sprinting = val;
        }

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) camera.rotation.y -= e.movementX * 0.002;
        });

        function checkCollision(pos, radius = 0.6) {
            for (let w of walls) {
                if (Math.abs(pos.x - w.position.x) < (wallSize/2 + radius) && 
                    Math.abs(pos.z - w.position.z) < (wallSize/2 + radius)) return true;
            }
            return false;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameRunning) {
                renderer.render(scene, camera);
                return;
            }
            const dt = clock.getDelta();

            // PURPLE MONSTER AI (STARE OR WANDER)
            const distToPurple = camera.position.distanceTo(purpleMonster.position);
            const effectRadius = 12; 
            let speedMultiplier = 1.0;

            if (distToPurple < effectRadius) {
                speedMultiplier = 0.3; 
                document.getElementById('blur-overlay').style.backdropFilter = 'blur(10px)';
                purpleMonster.lookAt(camera.position.x, 0.6, camera.position.z);
            } else {
                document.getElementById('blur-overlay').style.backdropFilter = 'blur(0px)';
                purpleWanderTimer -= dt;
                if (purpleWanderTimer <= 0) {
                    purpleTarget.set((Math.random() - 0.5) * 35, 0.6, (Math.random() - 0.5) * 35);
                    purpleWanderTimer = 4 + Math.random() * 4;
                }
                const pDir = purpleTarget.clone().sub(purpleMonster.position).normalize();
                const pNextPos = purpleMonster.position.clone().add(pDir.multiplyScalar(2 * dt));
                if (!checkCollision(pNextPos, 0.6)) {
                    purpleMonster.position.copy(pNextPos);
                    purpleMonster.lookAt(purpleTarget.x, 0.6, purpleTarget.z);
                } else {
                    purpleWanderTimer = 0; 
                }
            }

            // PLAYER MOVEMENT
            if (sprinting && (moveFwd || moveBwd || moveL || moveR) && !exhausted) {
                stamina -= dt;
                if (stamina <= 0) { stamina = 0; exhausted = true; }
            } else {
                stamina = Math.min(maxStamina, stamina + dt * 0.8);
                if (stamina >= maxStamina) exhausted = false;
            }
            document.getElementById('stamina-bar').style.width = (stamina/maxStamina*100) + '%';

            const baseSpeed = (sprinting && !exhausted ? 8 : 4);
            const currentSpeed = baseSpeed * speedMultiplier;
            const moveStep = currentSpeed * dt;
            const dir = new THREE.Vector3();
            if (moveFwd) dir.z -= 1; if (moveBwd) dir.z += 1;
            if (moveL) dir.x -= 1; if (moveR) dir.x += 1;
            dir.normalize().applyQuaternion(camera.quaternion);
            
            const nextPos = camera.position.clone().add(dir.multiplyScalar(moveStep));
            if (!checkCollision(nextPos, 0.4)) {
                camera.position.x = nextPos.x;
                camera.position.z = nextPos.z;
            }
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
